<style>
:root { --project-color: #0a2040; }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --bg-card: #111111;
  --text-primary: #e8e8e8; --text-secondary: #888888; --text-dim: #444444;
  --accent: #c8ff00; --border: #1e1e1e;
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Space Grotesk', monospace;
}
html { scrollbar-width: thin; scrollbar-color: #2a2a2a var(--bg); }
body { background: var(--bg); color: var(--text-primary); font-family: var(--font-body); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
::selection { background: var(--accent); color: var(--bg); }
img { display: block; max-width: 100%; }
nav.top { position: fixed; top: 0; left: 0; right: 0; z-index: 500; padding: 1.6rem 3rem; display: flex; justify-content: space-between; align-items: center; mix-blend-mode: difference; }
.nav-name { font-family: var(--font-mono); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #fff; text-decoration: none; }
.nav-back { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; opacity: 0.5; text-decoration: none; transition: opacity 0.2s; }
.nav-back:hover { opacity: 1; }
.project-header { padding: 8rem 3rem 3rem; border-bottom: 1px solid var(--border); }
.header-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
.header-title { font-family: var(--font-display); font-size: clamp(2.2rem, 5vw, 5rem); font-weight: 300; letter-spacing: -0.03em; line-height: 1; color: var(--text-primary); }
.hero-video { background: var(--bg); padding: 0 3rem; }
.video-wrap { position: relative; width: 100%; padding-bottom: 56.25%; background: #0d0d0d; }
.video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.video-wrap .ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0d0d0d 0%, var(--project-color) 100%); color: var(--text-dim); font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; }
.intro { padding: 5rem 3rem 4rem; display: grid; grid-template-columns: 1fr 300px; gap: 6rem; border-bottom: 1px solid var(--border); }
.intro-text { font-size: 0.98rem; line-height: 1.9; color: var(--text-secondary); font-weight: 300; max-width: 580px; }
.intro-text p + p { margin-top: 1.2rem; }
.meta { padding-top: 0.25rem; }
.meta-block { margin-bottom: 2.25rem; padding-bottom: 2.25rem; border-bottom: 1px solid var(--border); }
.meta-block:last-child { border-bottom: none; margin-bottom: 0; }
.meta-label { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.6rem; }
.meta-value { font-size: 0.88rem; color: var(--text-secondary); font-weight: 300; line-height: 1.7; }
.meta-value strong { color: var(--text-primary); font-weight: 400; display: block; }
.tag { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.3rem 0.75rem; border-radius: 2px; font-weight: 500; background: linear-gradient(90deg, #f4845f 0%, #e8637a 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; border: 1px solid rgba(244,132,95,0.3); }
.bleed { width: 100%; overflow: hidden; }
.bleed .ph-rect { height: 60vh; min-height: 380px; background: linear-gradient(135deg, #111 0%, var(--project-color) 100%); opacity: 0.3; }
.section { padding: 5rem 3rem; border-bottom: 1px solid var(--border); }
.section-label { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 3rem; }
.split { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; margin-bottom: 5rem; }
.split:last-child { margin-bottom: 0; }
.split.flip { direction: rtl; }
.split.flip > * { direction: ltr; }
.split-text h3 { font-family: var(--font-display); font-size: clamp(1.3rem, 2.2vw, 1.8rem); font-weight: 300; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 1.25rem; }
.split-text p { font-size: 0.9rem; line-height: 1.9; color: var(--text-secondary); font-weight: 300; }
.split-media { aspect-ratio: 4/3; overflow: hidden; background: var(--bg-card); position: relative; }
.split-media .ph { width: 100%; height: 100%; background: linear-gradient(135deg, #111 0%, var(--project-color) 100%); opacity: 0.3; }
.gallery { display: grid; gap: 0.75rem; }
.g-2 { grid-template-columns: 1fr 1fr; }
.g-3 { grid-template-columns: repeat(3, 1fr); }
.g-item { overflow: hidden; position: relative; background: var(--bg-card); }
.g-item.std { aspect-ratio: 4/3; }
.g-item .ph { width: 100%; height: 100%; background: linear-gradient(135deg, #111 0%, var(--project-color) 100%); opacity: 0.28; }
.credits { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem 4rem; }
.credit-role { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.35rem; }
.credit-name { font-size: 0.88rem; color: var(--text-secondary); font-weight: 300; }
.pagination { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border); }
.page-item { padding: 3rem; text-decoration: none; color: var(--text-primary); transition: background 0.3s ease; display: flex; flex-direction: column; gap: 0.6rem; }
.page-item:hover { background: var(--bg-card); }
.page-item.next { text-align: right; border-left: 1px solid var(--border); }
.page-dir { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }
.page-title { font-family: var(--font-display); font-size: clamp(1rem, 2vw, 1.4rem); font-weight: 300; letter-spacing: -0.02em; }
.footer { padding: 2.5rem 3rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.footer-copy { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.12em; color: var(--text-dim); }
.footer-links { display: flex; gap: 2rem; }
.footer-links a { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.12em; color: var(--text-dim); text-decoration: none; text-transform: uppercase; transition: color 0.3s; }
.footer-links a:hover { color: var(--text-primary); }
@media (max-width: 900px) {
  .intro { grid-template-columns: 1fr; gap: 3rem; }
  .split { grid-template-columns: 1fr; gap: 2.5rem; }
  .split.flip { direction: ltr; }
  .credits { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  nav.top { padding: 1.2rem 1.5rem; }
  .project-header { padding: 6rem 1.5rem 2.5rem; }
  .hero-video { padding: 0 1.5rem; }
  .intro, .section { padding: 3rem 1.5rem; }
  .bleed .ph-rect { height: 40vh; min-height: 240px; }
  .g-3 { grid-template-columns: 1fr 1fr; }
  .credits { grid-template-columns: 1fr; }
  .footer { flex-direction: column; gap: 1.5rem; text-align: center; }
  .page-item { padding: 2rem 1.5rem; }
}
</style>
</head>
