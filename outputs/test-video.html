<!DOCTYPE html>
<html><head><style>
body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 2rem; }
.card { position: relative; width: 600px; aspect-ratio: 16/10; background: #111; overflow: hidden; border-radius: 3px; }
.card video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
#status { margin-top: 1rem; font-size: 14px; color: #888; }
</style></head><body>
<h3>Video Preload Test</h3>
<div class="card">
  <video id="v" muted loop playsinline></video>
</div>
<div id="status">Loading...</div>
<script>
const v = document.getElementById('v');
const s = document.getElementById('status');
const url = 'https://kyfolio.b-cdn.net/010_Coreweave/video/shot_14.mp4';

v.addEventListener('loadstart', () => s.textContent += '\n> loadstart');
v.addEventListener('loadedmetadata', () => s.textContent += '\n> loadedmetadata (duration: ' + v.duration + ')');
v.addEventListener('loadeddata', () => { s.textContent += '\n> loadeddata (readyState: ' + v.readyState + ')'; v.currentTime = 0; });
v.addEventListener('seeked', () => s.textContent += '\n> seeked to ' + v.currentTime);
v.addEventListener('error', () => s.textContent += '\n> ERROR: ' + (v.error ? v.error.message : 'unknown'));
v.addEventListener('stalled', () => s.textContent += '\n> stalled');

v.src = url;
v.preload = 'auto';
s.textContent = 'Set src to: ' + url;
</script>
</body></html>
